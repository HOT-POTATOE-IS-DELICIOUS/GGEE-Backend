name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SPRING_R2DBC_URL: r2dbc:postgresql://localhost:5432/test
      SPRING_R2DBC_USERNAME: test
      SPRING_R2DBC_PASSWORD: test
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      KAFKA_STREAMS_APPLICATION_ID: ggee-backend-ci
      KAFKA_STREAMS_AUTO_STARTUP: "false"
      SERVER_PORT: "8080"
      CORS_PATH_PATTERN: /**
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      CORS_ALLOWED_METHODS: GET,POST,PUT,PATCH,DELETE,OPTIONS
      CORS_ALLOWED_HEADERS: '*'
      CORS_ALLOW_CREDENTIALS: "true"
      CORS_MAX_AGE: "3600"
      JWT_ACCESS_TOKEN_ACTIVE_TIME: PT1H
      JWT_REFRESH_TOKEN_ACTIVE_TIME: P7D
      JWT_HEADER: Authorization
      JWT_PREFIX: Bearer
      JWT_SECRET_KEY: test-secret-key-for-ci
      SNOWFLAKE_WORKER_ID: "1"
      GGEE_CRAWLER_RESULT_EVENT_TOPIC: crawl.result.control-plane
      GGEE_CRAWLER_DEDUPLICATED_COMMENT_TOPIC: crawl.comment.deduped
      GGEE_CRAWLER_DEDUP_STORE_NAME: crawler-comment-dedup-store
      GGEE_CRAWLER_DEDUP_TTL: PT24H
      GGEE_CRAWLER_DEDUP_CLEANUP_INTERVAL: PT5M
      GGEE_CRAWLER_JOB_CREATE_TOPIC: crawl.job.create

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Java 21 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Gradle 설정
        uses: gradle/actions/setup-gradle@v4

      - name: 테스트 실행
        run: ./gradlew test

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker 메타데이터 생성
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
