services:
  mysql:
    image: mysql:8.4
    container_name: ggee-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${SPRING_R2DBC_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: ${TZ}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ggee-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_R2DBC_URL: ${SPRING_R2DBC_URL}
    ports:
      - "${SERVER_PORT}:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
