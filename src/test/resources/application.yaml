spring:
  application:
    name: test-ggee-backend
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/test
    username: test
    password: test
  kafka:
    bootstrap-servers: localhost:9092
    streams:
      auto-startup: false

server:
  port: 0

cors:
  path-pattern: /**
  allowed-origins: http://localhost:3000
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: '*'
  allow-credentials: true
  max-age: 3600

jwt:
  access-token-active-time: 3600000
  refresh-token-active-time: 1209600000
  header: Authorization
  prefix: "Bearer "
  secret-key: ZmFrZS1mYWtlLWZha2UtZmFrZS1mYWtlLWZha2UtZmFrZS1mYWtlLWZha2U=

snowflake:
  worker-id: 1

ggee:
  member:
    protect-target-indexing-topic: test-protect-target-indexing
  crawler:
    result-event-topic: test-crawler-result
    deduplicated-comment-topic: test-deduplicated-comment
    dedup-store-name: test-comment-dedup-store
    dedup-ttl: 10m
    cleanup-interval: 1m
    job:
      create-topic: test-crawler-job-create
