spring:
  config:
    import: "optional:file:.env[.properties]"
  application:
    name: GGEE-Backend
  r2dbc:
    url: ${SPRING_R2DBC_URL}
    username: ${SPRING_R2DBC_USERNAME}
    password: ${SPRING_R2DBC_PASSWORD}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: ${SERVER_PORT}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

cors:
  path-pattern: ${CORS_PATH_PATTERN}
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
  allowed-methods: ${CORS_ALLOWED_METHODS}
  allowed-headers: ${CORS_ALLOWED_HEADERS}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS}
  max-age: ${CORS_MAX_AGE}

jwt:
  access-token-active-time: ${JWT_ACCESS_TOKEN_ACTIVE_TIME}
  refresh-token-active-time: ${JWT_REFRESH_TOKEN_ACTIVE_TIME}
  header: ${JWT_HEADER}
  prefix: ${JWT_PREFIX}
  secret-key: ${JWT_SECRET_KEY}

snowflake:
  worker-id: ${SNOWFLAKE_WORKER_ID}

event:
  user:
    registered-topic: ${USER_REGISTERED_TOPIC}
