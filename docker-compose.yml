services:
  postgres:
    image: postgres:17
    container_name: ggee-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${SPRING_R2DBC_PASSWORD}
      POSTGRES_USER: ${SPRING_R2DBC_USERNAME}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgresql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SPRING_R2DBC_USERNAME} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  kafka:
    image: redpandadata/redpanda:latest
    container_name: ggee-kafka
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --smp
      - "1"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
      - --pandaproxy-addr
      - PLAINTEXT://0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - PLAINTEXT://localhost:8082
      - --schema-registry-addr
      - PLAINTEXT://0.0.0.0:8081
      - --rpc-addr
      - PLAINTEXT://0.0.0.0:33145
      - --advertise-rpc-addr
      - PLAINTEXT://localhost:33145
    ports:
      - "${KAFKA_PORT}:9092"
      - "8081:8081"
      - "8082:8082"
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9644/v1/status/ready" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ggee-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/${POSTGRES_DB}
      KAFKA_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
    ports:
      - "${SERVER_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

volumes:
  postgres-data:
