spring:
  application:
    name: test-ggee-backend
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/test
    username: test
    password: test
  kafka:
    bootstrap-servers: localhost:9092
    streams:
      auto-startup: false

server:
  port: 0

cors:
  path-pattern: /**
  allowed-origins: http://localhost:3000
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: '*'
  allow-credentials: true
  max-age: 3600

jwt:
  access-token-active-time: 3600000
  refresh-token-active-time: 1209600000
  header: Authorization
  prefix: "Bearer "
  secret-key: ZmFrZS1mYWtlLWZha2UtZmFrZS1mYWtlLWZha2UtZmFrZS1mYWtlLWZha2U=

snowflake:
  worker-id: 1

ggee:
  ai:
    audit:
      base-url: http://localhost:18081
      timeout: 3s
    issue:
      base-url: http://localhost:18080
      timeout: 3s
  member:
    protect-target-indexing-dispatch-delay: 60000
  crawler:
    crawl-job-outbox-dispatch-delay: 60000
    dedup-store-name: ggee-crawler-dedup-store
    dedup-ttl: 10m
    cleanup-interval: 1m
