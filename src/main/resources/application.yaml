spring:
  config:
    import: "optional:file:.env[.properties]"
  application:
    name: GGEE-Backend
  r2dbc:
    url: ${SPRING_R2DBC_URL}
    username: ${SPRING_R2DBC_USERNAME}
    password: ${SPRING_R2DBC_PASSWORD}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    streams:
      application-id: ${KAFKA_STREAMS_APPLICATION_ID}
      auto-startup: ${KAFKA_STREAMS_AUTO_STARTUP}
      properties:
        default.key.serde: org.apache.kafka.common.serialization.Serdes$StringSerde
        processing.guarantee: at_least_once
        default.deserialization.exception.handler: org.apache.kafka.streams.errors.LogAndContinueExceptionHandler

server:
  port: ${SERVER_PORT}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

cors:
  path-pattern: ${CORS_PATH_PATTERN}
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
  allowed-methods: ${CORS_ALLOWED_METHODS}
  allowed-headers: ${CORS_ALLOWED_HEADERS}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS}
  max-age: ${CORS_MAX_AGE}

jwt:
  access-token-active-time: ${JWT_ACCESS_TOKEN_ACTIVE_TIME}
  refresh-token-active-time: ${JWT_REFRESH_TOKEN_ACTIVE_TIME}
  header: ${JWT_HEADER}
  prefix: ${JWT_PREFIX}
  secret-key: ${JWT_SECRET_KEY}

snowflake:
  worker-id: ${SNOWFLAKE_WORKER_ID}

ggee:
  ai:
    issue:
      base-url: ${GGEE_AI_ISSUE_BASE_URL}
      timeout: ${GGEE_AI_ISSUE_TIMEOUT}
  crawler:
    dedup-store-name: ggee-crawler-dedup-store
    dedup-ttl: ${GGEE_CRAWLER_DEDUP_TTL}
    cleanup-interval: ${GGEE_CRAWLER_DEDUP_CLEANUP_INTERVAL}
