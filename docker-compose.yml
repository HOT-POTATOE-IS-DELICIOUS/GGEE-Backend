services:
  postgres:
    image: postgres:17
    container_name: ggee-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${SPRING_R2DBC_PASSWORD}
      POSTGRES_USER: ${SPRING_R2DBC_USERNAME}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgresql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SPRING_R2DBC_USERNAME} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ggee-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_R2DBC_URL: ${SPRING_R2DBC_URL}
    ports:
      - "${SERVER_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
