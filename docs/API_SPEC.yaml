openapi: 3.0.3
info:
  title: GGEE Backend API
  description: |
    브랜드 평판 방화벽 플랫폼 백엔드 API

    ## 인증
    - `/auth/**`, `/actuator/health`, `/actuator/info` 경로는 인증 없이 접근 가능
    - 그 외 모든 경로는 `Authorization: Bearer <accessToken>` 필요
    - 한 계정당 하나의 기기에서만 로그인 가능. 새 기기에서 로그인하면 이전 기기 세션이 무효화됨

    ## 토큰 만료
    - Access Token / Refresh Token 만료 시간은 환경 설정에 따라 달라질 수 있음
  version: 0.0.1

servers:
  - url: http://localhost:8080
    description: Local

tags:
  - name: Auth
    description: 회원가입 및 로그인
  - name: IndexingJob
    description: 인덱싱 작업 상태 조회
  - name: Audit
    description: 입장문 검수
  - name: Issue
    description: 이슈 계통도 조회
  - name: Strategy
    description: 전략 채팅

paths:
  /auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: 회원가입
      description: 새로운 사용자 계정을 생성합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: "test@test.com"
              password: "password1234"
              protect_target: "백종원"
              protect_target_info: "더본코리아"
      responses:
        "201":
          description: 회원가입 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
              example:
                indexing_job_id: "107519243230003200"
                access_token: "eyJ0eXAiOiJqd3QiLCJhbGciOiJIUzI1NiJ9.xxxxx"
                refresh_token: "eyJ0eXAiOiJqd3QiLCJhbGciOiJIUzI1NiJ9.xxxxx"
        "400":
          description: 요청 본문 검증 실패
          content:
            text/plain:
              schema:
                type: string
              examples:
                blank_email:
                  value: "이메일이 입력되지 않았습니다."
                invalid_email:
                  value: "잘못된 이메일 형식입니다."
                blank_password:
                  value: "비밀번호가 입력되지 않았습니다."
                short_password:
                  value: "비밀번호는 최소 8자 이상 20자 이하여야 합니다."
                blank_protect_target:
                  value: "보호 대상을 입력해주세요."
                blank_protect_target_info:
                  value: "보호 대상 정보를 입력해주세요."
        "409":
          description: 이미 존재하는 이메일
          content:
            text/plain:
              schema:
                type: string
              example: "이미 존재하는 이메일입니다."

  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: 로그인
      description: |
        이메일과 비밀번호로 로그인하여 JWT 토큰을 발급받습니다.
        로그인 시 기존 활성 세션이 모두 무효화됩니다. 이전 기기의 토큰은 더 이상 유효하지 않습니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: "test@test.com"
              password: "password1234"
      responses:
        "201":
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                access_token: "eyJ0eXAiOiJqd3QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIxMDc1MTkyNDMyMzAwMDMyIiwicm9sZSI6IlVTRVIiLCJ0b2tlblR5cGUiOiJBQ0NFU1NfVE9LRU4iLCJzZXNzaW9uSWQiOiJjYmQyZGU5ZC1mMmExLTQ2Y2EtOWJhZS0zZjIzNjk2YzY3ZGEiLCJpYXQiOjE3NzU0Mjg2ODksImV4cCI6MTc3NTQzMjI4OX0.xxxxx"
                refresh_token: "eyJ0eXAiOiJqd3QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIxMDc1MTkyNDMyMzAwMDMyIiwicm9sZSI6IlVTRVIiLCJ0b2tlblR5cGUiOiJSRUZSRVNIX1RPS0VOIiwic2Vzc2lvbklkIjoiY2JkMmRlOWQtZjJhMS00NmNhLTliYWUtM2YyMzY5NmM2N2RhIiwiaWF0IjoxNzc1NDI4Njg5LCJleHAiOjE3NzY2MzgyODl9.xxxxx"
        "400":
          description: 요청 본문 검증 실패
          content:
            text/plain:
              schema:
                type: string
              examples:
                blank_email:
                  value: "이메일이 입력되지 않았습니다."
                invalid_email:
                  value: "잘못된 이메일 형식입니다."
                blank_password:
                  value: "비밀번호가 입력되지 않았습니다."
                short_password:
                  value: "비밀번호는 최소 8자 이상 20자 이하여야 합니다."
        "401":
          description: 이메일 또는 비밀번호 불일치
          content:
            text/plain:
              schema:
                type: string
              example: "이메일 또는 비밀번호가 올바르지 않습니다."

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refresh
      summary: 토큰 갱신
      description: |
        Refresh Token으로 새로운 Access Token과 Refresh Token을 발급받습니다. (토큰 로테이션)
        Refresh Token이 만료된 경우 재로그인이 필요합니다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            example:
              refresh_token: "eyJ0eXAiOiJqd3QiLCJhbGciOiJIUzI1NiJ9.xxxxx"
      responses:
        "200":
          description: 토큰 갱신 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
              example:
                access_token: "eyJ0eXAiOiJqd3QiLCJhbGciOiJIUzI1NiJ9.xxxxx"
                refresh_token: "eyJ0eXAiOiJqd3QiLCJhbGciOiJIUzI1NiJ9.xxxxx"
        "400":
          description: 요청 본문 검증 실패 또는 잘못된 토큰
          content:
            text/plain:
              schema:
                type: string
              examples:
                blank_token:
                  value: "refreshToken이 입력되지 않았습니다."
                invalid_token:
                  value: "올바르지 않은 JWT 토큰입니다."
                invalid_token_type:
                  value: "올바르지 않은 JWT 토큰 타입입니다."
                invalid_session:
                  value: "유효하지 않은 세션입니다."
        "401":
          description: 만료된 Refresh Token 또는 세션 만료
          content:
            text/plain:
              schema:
                type: string
              examples:
                expired_refresh_token:
                  value: "만료된 리프레시 토큰입니다."
                session_expired:
                  value: "다른 기기에서 로그인되어 세션이 만료되었습니다."

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: 로그아웃
      description: |
        현재 인증된 사용자의 활성 세션을 무효화합니다.
        로그아웃 이후 기존 refresh token으로는 더 이상 토큰 갱신이 불가능합니다.
      security:
        - BearerAuth: []
      responses:
        "204":
          description: 로그아웃 성공
        "400":
          description: 잘못된 JWT 토큰
          content:
            text/plain:
              schema:
                type: string
              example: "올바르지 않은 JWT 토큰입니다."
        "401":
          description: 인증 실패 또는 세션 만료
          content:
            text/plain:
              schema:
                type: string
              examples:
                missing_token:
                  value: ""
                expired_token:
                  value: "만료된 JWT 토큰입니다."
                session_expired:
                  value: "다른 기기에서 로그인되어 세션이 만료되었습니다."

  /indexing/jobs/{jobId}:
    get:
      tags: [IndexingJob]
      operationId: streamJobCompletion
      summary: 인덱싱 작업 완료 대기 (SSE)
      description: |
        지정한 인덱싱 작업이 완료될 때까지 Server-Sent Events(SSE) 스트림으로 대기합니다.
        작업 완료 시 `completed` 이벤트가 전송됩니다.
      security:
        - BearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          description: 인덱싱 작업 ID (`/auth/register` 응답의 `indexing_job_id`)
          schema:
            type: string
          example: "107519243230003200"
      responses:
        "200":
          description: SSE 스트림 연결 성공. 작업 완료 시 completed 이벤트 수신
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                event: completed
                data: done
        "401":
          description: 인증 실패 (토큰 없음, 만료, 세션 만료 등)
          content:
            text/plain:
              schema:
                type: string
              examples:
                expired_token:
                  value: "만료된 JWT 토큰입니다."
                invalid_token:
                  value: "올바르지 않은 JWT 토큰입니다."
                session_expired:
                  value: "다른 기기에서 로그인되어 세션이 만료되었습니다."

  /issues:
    get:
      tags: [Issue]
      operationId: getIssues
      summary: 이슈 계통도 조회
      description: |
        로그인한 사용자의 `protectTarget`, `protectTargetInfo`를 기준으로 이슈 목록과 이슈 간 의미적 연결 관계를 조회합니다.
        `connections.source_id -> connections.target_id` 방향은 최신 이슈가 과거 이슈를 재조명하는 의미입니다.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 이슈 계통도 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssuesResponse'
              example:
                protect_target: "백종원"
                issues:
                  - id: "4:c39a66eb-67e6-4ff4-954a-4c9d2fbcd69a:6050"
                    title: "백종원 더본코리아 가맹점 갑질 논란"
                    summary: "더본코리아 가맹점주들이 본사의 갑질 행위를 폭로하며..."
                    date: "2024-03-15"
                    criticism: 0.82
                    support: 0.12
                    interest: 0.73
                  - id: "4:c39a66eb-67e6-4ff4-954a-4c9d2fbcd69a:6120"
                    title: "백종원 연돈볼카츠 허위광고 의혹"
                    summary: "연돈볼카츠 브랜드의 광고가 실제와 다르다는 지적이..."
                    date: "2024-09-01"
                    criticism: 0.76
                    support: 0.18
                    interest: 0.69
                connections:
                  - source_id: "4:c39a66eb-67e6-4ff4-954a-4c9d2fbcd69a:6120"
                    target_id: "4:c39a66eb-67e6-4ff4-954a-4c9d2fbcd69a:6050"
                    similarity: 0.847
        "401":
          description: 인증 실패 또는 세션 만료
          content:
            text/plain:
              schema:
                type: string
              examples:
                expired_token:
                  value: "만료된 JWT 토큰입니다."
                session_expired:
                  value: "다른 기기에서 로그인되어 세션이 만료되었습니다."
        "404":
          description: 인증된 사용자를 찾을 수 없음
          content:
            text/plain:
              schema:
                type: string
              example: "사용자를 찾을 수 없습니다."
        "503":
          description: 이슈 계통도 조회 서버 통신 실패
          content:
            text/plain:
              schema:
                type: string
              example: "이슈 계통도 조회 서버와 통신할 수 없습니다."

  /audit:
    post:
      tags: [Audit]
      operationId: auditStatement
      summary: 입장문 검수
      description: |
        입력한 엔티티 정보와 입장문 텍스트를 기준으로 문장 단위 검수를 수행합니다.
        여러 시선에서 탐지된 결과를 문장별로 묶어 수정 제안과 함께 반환합니다.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditRequest'
            example:
              text: "홍어들이 또 난리났네."
      responses:
        "200":
          description: 입장문 검수 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditResponse'
              example:
                audit_id: 107519243230003200
                reviews:
                  - sentence:
                      sentence_text: "홍어들이 또 난리났네."
                      start_offset: 0
                      end_offset: 12
                    perspective_ids: ["community"]
                    perspective_labels: ["커뮤니티 성향"]
                    suggestions:
                      - start_index: 0
                        end_index: 4
                        before: "홍어들이"
                        after: "그 사람들이"
                        reason: "이 문장에서 일베 커뮤니티 특유의 언어·문화 표현이 탐지되었습니다."
        "400":
          description: 요청 본문 검증 실패
          content:
            text/plain:
              schema:
                type: string
              examples:
                blank_text:
                  value: "검수할 입장문을 입력해주세요."
        "401":
          description: 인증 실패 또는 세션 만료
          content:
            text/plain:
              schema:
                type: string
              examples:
                expired_token:
                  value: "만료된 JWT 토큰입니다."
                session_expired:
                  value: "다른 기기에서 로그인되어 세션이 만료되었습니다."
        "503":
          description: 입장문 검수 서버 통신 실패
          content:
            text/plain:
              schema:
                type: string
              example: "입장문 검수 서버와 통신할 수 없습니다."

  /strategy/rooms:
    post:
      tags: [Strategy]
      operationId: createStrategyChatRoom
      summary: 전략 채팅방 생성
      description: 로그인한 사용자의 전략 채팅방을 새로 생성합니다.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomRequest'
            example:
              message: "백종원 관련 최신 이슈를 분석해줘"
      responses:
        "200":
          description: 채팅방 생성 성공 (SSE 스트림)
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                event: room_created
                data: {"room_id": 107519243230003200}

                event: content_chunk
                data: {"delta": "안녕하세요"}

                event: done
                data: {"message_id": "abc123"}
        "400":
          description: 요청 본문 검증 실패
          content:
            text/plain:
              schema:
                type: string
              example: "메시지를 입력해주세요."
        "401":
          description: 인증 실패 또는 세션 만료
          content:
            text/plain:
              schema:
                type: string

    get:
      tags: [Strategy]
      operationId: getStrategyChatRooms
      summary: 전략 채팅방 목록 조회
      description: 로그인한 사용자의 전략 채팅방 목록을 조회합니다.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 채팅방 목록 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StrategyRoomResponse'
        "401":
          description: 인증 실패 또는 세션 만료
          content:
            text/plain:
              schema:
                type: string

  /strategy/rooms/{roomId}/messages:
    get:
      tags: [Strategy]
      operationId: getStrategyChatMessages
      summary: 전략 채팅 메시지 목록 조회
      description: 특정 채팅방의 메시지 목록을 조회합니다.
      security:
        - BearerAuth: []
      parameters:
        - name: roomId
          in: path
          required: true
          description: 채팅방 ID
          schema:
            type: integer
            format: int64
          example: 107519243230003200
      responses:
        "200":
          description: 메시지 목록 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StrategyMessageResponse'
        "401":
          description: 인증 실패 또는 세션 만료
          content:
            text/plain:
              schema:
                type: string

  /strategy/rooms/{roomId}/messages/stream:
    post:
      tags: [Strategy]
      operationId: streamStrategyChat
      summary: 전략 채팅 AI 스트림
      description: |
        사용자 메시지를 전송하고 AI 응답을 Server-Sent Events(SSE) 스트림으로 수신합니다.
      security:
        - BearerAuth: []
      parameters:
        - name: roomId
          in: path
          required: true
          description: 채팅방 ID
          schema:
            type: integer
            format: int64
          example: 107519243230003200
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StreamRequest'
            example:
              message: "백종원 관련 최신 이슈를 분석해줘"
      responses:
        "200":
          description: SSE 스트림 연결 성공
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: 요청 본문 검증 실패
          content:
            text/plain:
              schema:
                type: string
              example: "메시지를 입력해주세요."
        "401":
          description: 인증 실패 또는 세션 만료
          content:
            text/plain:
              schema:
                type: string

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Authorization: Bearer <accessToken>"

  schemas:
    RegisterRequest:
      type: object
      required: [email, password, protect_target, protect_target_info]
      properties:
        email:
          type: string
          format: email
          description: 사용자 이메일
          example: "user@example.com"
        password:
          type: string
          minLength: 8
          maxLength: 20
          description: 비밀번호 (8~20자)
          example: "password123"
        protect_target:
          type: string
          description: 보호 대상 브랜드 또는 키워드
          example: "brand"
        protect_target_info:
          type: string
          description: 보호 대상 상세 정보
          example: "브랜드 공식몰"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: 사용자 이메일
          example: "user@example.com"
        password:
          type: string
          minLength: 8
          maxLength: 20
          description: 비밀번호 (8~20자)
          example: "password123"

    RegisterResponse:
      type: object
      properties:
        indexing_job_id:
          type: string
          description: "인덱싱 작업 ID. `/indexing/jobs/{jobId}` SSE 엔드포인트에서 완료 여부를 확인하는 데 사용"
          example: "107519243230003200"
        access_token:
          type: string
          description: "JWT 액세스 토큰. Claims: sub(userId), role, tokenType, sessionId, iat, exp"
        refresh_token:
          type: string
          description: "JWT 리프레시 토큰. Claims: sub(userId), role, tokenType, sessionId, iat, exp"

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
          description: "JWT 액세스 토큰. 만료 시간은 환경 설정에 따름. Claims: sub(userId), role, tokenType, sessionId, iat, exp"
        refresh_token:
          type: string
          description: "JWT 리프레시 토큰. 만료 시간은 환경 설정에 따름. Claims: sub(userId), role, tokenType, sessionId, iat, exp"

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: 로그인 또는 이전 갱신 시 발급받은 Refresh Token

    RefreshResponse:
      type: object
      properties:
        access_token:
          type: string
          description: "새로 발급된 JWT 액세스 토큰"
        refresh_token:
          type: string
          description: "새로 발급된 JWT 리프레시 토큰 (토큰 로테이션)"

    AuditRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          description: 검수할 입장문 원문
          minLength: 1
          example: "홍어들이 또 난리났네."

    AuditResponse:
      type: object
      properties:
        audit_id:
          type: integer
          format: int64
          description: 검수 실행 고유 ID
          example: 107519243230003200
        reviews:
          type: array
          description: 이슈가 탐지된 문장별 검수 결과
          items:
            $ref: '#/components/schemas/AuditReview'

    AuditReview:
      type: object
      properties:
        sentence:
          $ref: '#/components/schemas/AuditSentence'
        perspective_ids:
          type: array
          description: 이슈를 탐지한 시선 ID 목록
          items:
            type: string
          example: ["community", "gender"]
        perspective_labels:
          type: array
          description: 이슈를 탐지한 시선 한글 라벨 목록
          items:
            type: string
          example: ["커뮤니티 성향", "성별 편향"]
        suggestions:
          type: array
          description: 문장에 대한 수정 제안 목록
          items:
            $ref: '#/components/schemas/AuditSuggestion'

    AuditSentence:
      type: object
      properties:
        sentence_text:
          type: string
          description: 검수 대상 문장 텍스트
          example: "홍어들이 또 난리났네."
        start_offset:
          type: integer
          description: 원본 text 기준 시작 위치
          example: 0
        end_offset:
          type: integer
          description: 원본 text 기준 끝 위치
          example: 12

    AuditSuggestion:
      type: object
      properties:
        start_index:
          type: integer
          description: sentence 내부 시작 위치
          example: 0
        end_index:
          type: integer
          description: sentence 내부 끝 위치
          example: 4
        before:
          type: string
          description: 원문 문제 표현
          example: "홍어들이"
        after:
          type: string
          description: 바로 적용 가능한 수정 표현
          example: "그 사람들이"
        reason:
          type: string
          description: 문제 표현에 대한 설명
          example: "이 문장에서 일베 커뮤니티 특유의 언어·문화 표현이 탐지되었습니다."

    IssuesResponse:
      type: object
      properties:
        protect_target:
          type: string
          description: 로그인한 사용자의 보호 대상 이름
          example: "백종원"
        issues:
          type: array
          description: 연결된 이슈 목록. 날짜 오름차순 정렬
          items:
            $ref: '#/components/schemas/IssueNode'
        connections:
          type: array
          description: 유사도 임계값 이상인 이슈 연결 목록
          items:
            $ref: '#/components/schemas/IssueConnection'

    IssueNode:
      type: object
      properties:
        id:
          type: string
          description: Neo4j 노드 고유 ID
          example: "4:c39a66eb-67e6-4ff4-954a-4c9d2fbcd69a:6050"
        title:
          type: string
          description: 이슈 제목
          example: "백종원 더본코리아 가맹점 갑질 논란"
        summary:
          type: string
          description: 이슈 요약문
          example: "더본코리아 가맹점주들이 본사의 갑질 행위를 폭로하며..."
        date:
          type: string
          format: date
          description: 이슈 발생 날짜 (YYYY-MM-DD)
          example: "2024-03-15"
        criticism:
          type: number
          format: double
          description: 비판 여론 지수 (0.0 ~ 1.0)
          example: 0.82
        support:
          type: number
          format: double
          description: 지지 여론 지수 (0.0 ~ 1.0)
          example: 0.12
        interest:
          type: number
          format: double
          description: 관심도 지수 (0.0 ~ 1.0)
          example: 0.73

    IssueConnection:
      type: object
      properties:
        source_id:
          type: string
          description: 더 최신 날짜의 이슈 ID
          example: "4:c39a66eb-67e6-4ff4-954a-4c9d2fbcd69a:6120"
        target_id:
          type: string
          description: 더 오래된 날짜의 이슈 ID
          example: "4:c39a66eb-67e6-4ff4-954a-4c9d2fbcd69a:6050"
        similarity:
          type: number
          format: double
          description: 두 이슈 간 Cosine Similarity (0.0 ~ 1.0)
          example: 0.847

    StreamRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: 사용자 채팅 메시지
          minLength: 1
          example: "백종원 관련 최신 이슈를 분석해줘"

    CreateStrategyRoomResponse:
      type: object
      properties:
        room_id:
          type: integer
          format: int64
          description: 생성된 채팅방 ID
          example: 107519243230003200

    CreateRoomRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: 첫 번째 채팅 메시지 (앞 12자가 방 제목으로 사용됨)
          minLength: 1
          example: "백종원 관련 최신 이슈를 분석해줘"

    StrategyRoomResponse:
      type: object
      properties:
        room_id:
          type: integer
          format: int64
          description: 채팅방 ID
          example: 107519243230003200
        title:
          type: string
          description: 채팅방 제목 (첫 메시지 앞 12자)
          example: "백종원 관련 최신"
        last_chatted_at:
          type: string
          format: date-time
          nullable: true
          description: 마지막 채팅 시각 (채팅 없으면 null)
          example: "2024-03-15T10:30:00"
        created_at:
          type: string
          format: date-time
          description: 채팅방 생성 시각
          example: "2024-03-15T10:00:00"

    StrategyMessageResponse:
      type: object
      properties:
        message_id:
          type: integer
          format: int64
          description: 메시지 ID
          example: 107519243230003201
        role:
          type: string
          enum: [USER, ASSISTANT]
          description: 메시지 발신자 역할
          example: "USER"
        content:
          type: string
          description: 메시지 내용
          example: "백종원 관련 최신 이슈를 분석해줘"
        intent:
          type: string
          nullable: true
          description: AI가 분석한 메시지 의도
          example: "issue_analysis"
        refined_query:
          type: string
          nullable: true
          description: AI가 재작성한 검색 쿼리
          example: "백종원 최신 이슈 2024"
        meta_json:
          type: string
          nullable: true
          description: 메시지 관련 메타데이터 (JSON 문자열)
          example: null
        created_at:
          type: string
          format: date-time
          description: 메시지 생성 시각
          example: "2024-03-15T10:30:00"
